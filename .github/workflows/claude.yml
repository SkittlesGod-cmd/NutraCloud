name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize] # Uses supported PR events

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Resolves the Node 20 deprecation warning

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
